name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── validation: must pass before anything else runs ────────────────────────
  validate:
    name: Validate blog integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate posts, captures, and links (strict)
        # --strict promotes warnings→errors: all captures must exist on main.
        # --branches scans remote branches for session number collisions.
        run: python3 tools/validate_blog.py --strict --branches

  # ── build: runs only if validation passes ──────────────────────────────────
  build:
    name: Build site
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Regenerate knowledge graph
        run: python3 tools/graph_viz.py

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
        working-directory: docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  # ── deploy: runs only if build passes ─────────────────────────────────────
  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
