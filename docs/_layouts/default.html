<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- xterm.js for ANSI rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p class="tagline">{{ site.description }}</p>
            <nav>
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/archive.html' | relative_url }}">Archive</a>
                <a href="{{ '/gallery.html' | relative_url }}">Gallery</a>
                <a href="https://github.com/neurhizome/terminal-art">Repository</a>
            </nav>
        </header>

        <main class="content">
            {{ content }}
        </main>

        <footer class="site-footer">
            <p>{{ site.description }}</p>
            <p>Built with Jekyll • Hosted on GitHub Pages • <a href="https://github.com/neurhizome/terminal-art">Source</a></p>
        </footer>
    </div>

    <!-- Custom JS for ANSI rendering -->
    <script src="{{ '/assets/js/ansi-viewer.js' | relative_url }}"></script>
</body>
</html>
